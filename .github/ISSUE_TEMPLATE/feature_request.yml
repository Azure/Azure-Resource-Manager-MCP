name: Feature Request
description: Suggest an idea or enhancement
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting an improvement to arm-mcp-server!
  
  - type: textarea
    id: problem-statement
    attributes:
      label: Problem Statement / Motivation
      description: What problem are you trying to solve? Who benefits and why?
      placeholder: Tell us about the problem or need you've identified
    validations:
      required: true
  
  - type: textarea
    id: proposed-solution
    attributes:
      label: Proposed Solution
      description: Describe the solution you'd like to see, including any API/UX expectations if applicable.
      placeholder: Describe your ideal solution
    validations:
      required: true
  
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: Describe any alternative solutions or features you've considered.
      placeholder: What other approaches have you thought about?
    validations:
      required: false
  
  - type: textarea
    id: additional-context
    attributes:
      label: Additional Context
      description: Add any other context, links, screenshots, or examples that help explain the request.
    validations:
      required: false
